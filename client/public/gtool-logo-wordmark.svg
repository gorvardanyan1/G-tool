<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2318"/>
    </linearGradient>
  </defs>

  <!-- Icon square -->
  <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="98" height="98" rx="21.5" fill="none" stroke="#10b981" stroke-width="1" stroke-opacity="0.2"/>
  <!-- corner accent -->
  <line x1="2" y1="26" x2="2" y2="2" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="2" y1="2" x2="26" y2="2" stroke="#10b981" stroke-width="3.5" stroke-linecap="round"/>
  <!-- G -->
  <path d="M66 28 A24 24 0 1 0 66 72" fill="none" stroke="#10b981" stroke-width="7.5" stroke-linecap="round"/>
  <line x1="66" y1="50" x2="48" y2="50" stroke="#10b981" stroke-width="7.5" stroke-linecap="round"/>
  <!-- wrench -->
  <g transform="translate(69,20) rotate(42)">
    <rect x="-3" y="-10" width="6" height="20" rx="3" fill="#fb923c"/>
    <circle cx="0" cy="-10" r="5.5" fill="none" stroke="#fb923c" stroke-width="2.8"/>
    <circle cx="0" cy="10" r="5.5" fill="none" stroke="#fb923c" stroke-width="2.8"/>
    <circle cx="0" cy="-10" r="2" fill="#0a1628"/>
    <circle cx="0" cy="10" r="2" fill="#0a1628"/>
  </g>

  <!-- Wordmark text -->
  <text x="118" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#f1f5f9" letter-spacing="-1">G</text>
  <text x="144" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="300" fill="#334155">-</text>
  <text x="160" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" fill="#10b981" letter-spacing="-0.5">Tool</text>

  <!-- Tagline -->
  <text x="118" y="78" font-family="'Courier New', monospace" font-size="11" fill="#475569" letter-spacing="3">YOUR TOOLKIT</text>

  <!-- Orange accent dot after Tool -->
  <circle cx="258" cy="30" r="5" fill="#fb923c" opacity="0.85"/>
</svg>
